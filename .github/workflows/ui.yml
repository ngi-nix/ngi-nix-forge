name: Deploy UI

on:
  push:
    branches: ["master"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. However, do NOT cancel in-progress runs as we
# want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install nix
        uses: cachix/install-nix-action@19effe9fe722874e6d46dd7182e4b8b7a43c4a99 # v31.10.0

      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: flake-forge
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Setup GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Encode version information
        run: |
          commit="$(git rev-parse --short HEAD)"
          sed -i "s/:master/$commit/g" ui/src/Main/View.elm

      - name: Configure the baseUrl
        run: |
          set -x
          repo_name="${{ github.event.repository.name }}"
          if [[ "$repo_name" == *.github.io ]]; then
            deploy_root="/"
          else
            deploy_root="/$repo_name/"
          fi
          sed -i "s|:baseUrl|$deploy_root|g" ui/src/Main/Route.elm
          sed -i "s|:baseUrl|$deploy_root|g" ui/src/index.html

      - name: Build UI
        run: nix build .#_forge-ui --accept-flake-config

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: 'result'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
